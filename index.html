<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GYDS Wallet — Send, Receive & Swap GYDS</title>
    <meta name="description" content="GYDS Network Wallet — send, receive, swap, and manage GYDS & GYD tokens on the go. Works offline." />
    <meta name="author" content="GYDS Network" />
    <meta name="theme-color" content="#0f1318" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GYDS Wallet" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />

    <meta property="og:title" content="GYDS Wallet" />
    <meta property="og:description" content="GYDS Network Wallet — send, receive, swap, and manage GYDS & GYD tokens on the go." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@gydsnetwork" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f1318;
        transition: opacity 0.5s ease-out;
      }
      #splash-screen.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash-logo {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: linear-gradient(135deg, #34d399, #06b6d4);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: splash-pulse 1.8s ease-in-out infinite;
      }
      #splash-logo span {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: #0f1318;
        letter-spacing: -1px;
      }
      #splash-name {
        margin-top: 20px;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 22px;
        font-weight: 600;
        color: #e2e8f0;
        letter-spacing: -0.5px;
      }
      #splash-loader {
        margin-top: 32px;
        width: 36px;
        height: 36px;
        border: 3px solid rgba(52, 211, 153, 0.15);
        border-top-color: #34d399;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="splash-screen">
      <div id="splash-logo"><span>G</span></div>
      <div id="splash-name">GYDS Wallet</div>
      <div id="splash-loader"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
